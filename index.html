<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Finanzas</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:-apple-system;background:#f4f6f8}
header{background:#0f172a;color:white;padding:18px;text-align:center;font-size:22px;font-weight:700}
nav{display:flex;background:white}
nav button{flex:1;padding:14px;border:0;font-weight:700}
nav button.active{background:#0f172a;color:white}
section{display:none;padding:16px}
section.active{display:block}
.card{background:white;border-radius:16px;padding:16px;margin-bottom:16px}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:10px}
.btn{width:100%;padding:12px;border:0;border-radius:10px;background:#0f172a;color:white;margin-top:8px}
.btn2{background:#2563eb}
.btnDanger{background:#dc2626}
.mov{border-bottom:1px solid #ccc;padding:10px 0}
.ok{color:green;font-weight:700}
.no{color:red;font-weight:700}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;border-bottom:1px solid #ccc;text-align:right}
th:first-child,td:first-child{text-align:left}
</style>
</head>

<body>

<header>Mis Finanzas</header>

<nav>
<button class="active" onclick="showTab('tc',this)">TC</button>
<button onclick="showTab('bancos',this)">Bancos</button>
<button onclick="showTab('amortizacion',this)">Amortización</button>
</nav>

<!-- TC -->
<section id="tc" class="active">
<div class="card">

<input type="date" id="tcFecha">
<select id="tcTarjeta"><option>Visa</option><option>Mastercard</option></select>

<select id="tcConcepto">
<option>Supermercado</option><option>Gasolina</option><option>Otros</option>
</select>

<input id="tcDetalle" placeholder="Detalle">

<select id="tcTipo">
<option>Corriente</option>
<option>Diferido</option>
</select>

<input type="number" id="tcPagadas" placeholder="Cuotas pagadas" value="0">
<input type="number" id="tcPorPagar" placeholder="Cuotas por pagar" value="0">

<input type="number" id="tcValor" placeholder="Valor">
<input type="number" id="tcPago" placeholder="Pago" value="0">

<button class="btn" onclick="guardarTC()">Guardar</button>
<button class="btn btn2" onclick="exportarExcel('tc')">Exportar Pendientes</button>

</div>

<div class="card" id="listaTC"></div>
</section>

<!-- BANCOS -->
<section id="bancos">
<div class="card">

<input type="date" id="bFecha">
<select id="bBanco"><option>Guayaquil</option><option>Pichincha</option></select>
<select id="bTipo"><option>Ingreso</option><option>Egreso</option></select>

<input id="bConcepto" placeholder="Concepto">
<input type="number" id="bValor" placeholder="Valor">

<button class="btn" onclick="guardarBanco()">Guardar</button>
<button class="btn btn2" onclick="exportarExcel('bancos')">Exportar Pendientes</button>

</div>

<div class="card" id="listaBancos"></div>
</section>

<!-- AMORTIZACION -->
<section id="amortizacion">
<div class="card">

<input type="number" id="amoMonto" placeholder="Monto">
<input type="number" id="amoTasa" placeholder="Tasa %">
<input type="number" id="amoMeses" placeholder="Meses">

<button class="btn" onclick="calcularAmortizacion()">Calcular</button>
<button class="btn btn2" onclick="exportarAmortizacion()">Exportar Excel</button>

</div>

<div class="card">
<div id="resumenAmo"></div>
<table id="tablaAmo"></table>
</div>
</section>

<script>

let tc = JSON.parse(localStorage.getItem("tc")) || [];
let bancos = JSON.parse(localStorage.getItem("bancos")) || [];
let amortizacion = [];

function showTab(id,btn){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("active");
btn.classList.add("active");
}

function guardarTC(){
let valor=Number(tcValor.value||0);
let pago=Number(tcPago.value||0);

let saldoDiferido=tcTipo.value==="Diferido"
?valor*Number(tcPorPagar.value||0):0;

tc.push({
Fecha:tcFecha.value,
Tarjeta:tcTarjeta.value,
Concepto:tcConcepto.value,
Detalle:tcDetalle.value,
Tipo:tcTipo.value,
CuotasPagadas:Number(tcPagadas.value||0),
CuotasPorPagar:Number(tcPorPagar.value||0),
Valor:valor,
Pago:pago,
Acumulado:valor-pago,
SaldoDiferido:saldoDiferido,
Conciliado:"No"
});

localStorage.setItem("tc",JSON.stringify(tc));
mostrarTC();
}

function mostrarTC(){
listaTC.innerHTML="";
tc.slice().reverse().forEach((m,i)=>{
let idx=tc.length-1-i;
listaTC.innerHTML+=`
<div class="mov">
<strong>${m.Fecha} | ${m.Concepto}</strong>
<div>${m.Detalle||""}</div>
<div>Tipo: ${m.Tipo}</div>
<div>Cuotas: ${m.CuotasPagadas} / ${m.CuotasPorPagar}</div>
<div>Valor: $${m.Valor}</div>
<div>Pago: $${m.Pago}</div>
<div>Saldo diferido: $${m.SaldoDiferido}</div>
<div class="${m.Conciliado==='Si'?'ok':'no'}">Estado: ${m.Conciliado}</div>
<button class="btn btnDanger" onclick="eliminarTC(${idx})">Eliminar</button>
</div>`;
});
}

function eliminarTC(i){
tc.splice(i,1);
localStorage.setItem("tc",JSON.stringify(tc));
mostrarTC();
}

function guardarBanco(){
bancos.push({
Fecha:bFecha.value,
Banco:bBanco.value,
Tipo:bTipo.value,
Concepto:bConcepto.value,
Valor:Number(bValor.value||0),
Conciliado:"No"
});

localStorage.setItem("bancos",JSON.stringify(bancos));
mostrarBancos();
}

function mostrarBancos(){
listaBancos.innerHTML="";
bancos.slice().reverse().forEach((m,i)=>{
let idx=bancos.length-1-i;
listaBancos.innerHTML+=`
<div class="mov">
<strong>${m.Fecha} | ${m.Banco}</strong>
<div>${m.Concepto}</div>
<div>$${m.Valor}</div>
<div class="${m.Conciliado==='Si'?'ok':'no'}">Estado: ${m.Conciliado}</div>
<button class="btn btnDanger" onclick="eliminarBanco(${idx})">Eliminar</button>
</div>`;
});
}

function eliminarBanco(i){
bancos.splice(i,1);
localStorage.setItem("bancos",JSON.stringify(bancos));
mostrarBancos();
}

function exportarExcel(tipo){
let data=tipo==="tc"?tc:bancos;
let pendientes=data.filter(d=>d.Conciliado==="No");

if(pendientes.length===0){
alert("No hay pendientes");
return;
}

let ws=XLSX.utils.json_to_sheet(pendientes);
let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Pendientes");
XLSX.writeFile(wb,tipo+"_pendientes.xlsx");

data.forEach(d=>{
if(d.Conciliado==="No"){d.Conciliado="Si";}
});

localStorage.setItem(tipo,JSON.stringify(data));
mostrarTC();
mostrarBancos();
}

function calcularAmortizacion(){
let monto=Number(amoMonto.value||0);
let tasa=Number(amoTasa.value||0)/100/12;
let meses=Number(amoMeses.value||0);

let cuota=monto*(tasa*Math.pow(1+tasa,meses))/(Math.pow(1+tasa,meses)-1);
let saldo=monto;

amortizacion=[];
tablaAmo.innerHTML="<tr><th>Mes</th><th>Cuota</th><th>Interes</th><th>Capital</th><th>Saldo</th></tr>";

for(let i=1;i<=meses;i++){
let interes=saldo*tasa;
let capital=cuota-interes;
saldo-=capital;

amortizacion.push({Mes:i,Cuota:cuota,Interes:interes,Capital:capital,Saldo:saldo});

tablaAmo.innerHTML+=`<tr>
<td>${i}</td>
<td>${cuota.toFixed(2)}</td>
<td>${interes.toFixed(2)}</td>
<td>${capital.toFixed(2)}</td>
<td>${saldo.toFixed(2)}</td>
</tr>`;
}
}

function exportarAmortizacion(){
let ws=XLSX.utils.json_to_sheet(amortizacion);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Amortizacion");
XLSX.writeFile(wb,"amortizacion.xlsx");
}

mostrarTC();
mostrarBancos();

</script>

</body>
</html>
