<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Finanzas</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;background:#f4f6f8;color:#111827}
header{background:#0f172a;color:white;padding:18px;text-align:center;font-size:22px;font-weight:700}
nav{display:flex;background:white;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.08)}
nav button{flex:1;padding:12px 4px;border:0;background:white;font-weight:700;color:#334155;font-size:13px}
nav button.active{background:#0f172a;color:white}
section{display:none;padding:16px}
section.active{display:block}
.card{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
label{font-size:13px;font-weight:700;color:#475569}
input,select{width:100%;padding:12px;margin:6px 0 12px;border:1px solid #cbd5e1;border-radius:10px;font-size:16px;box-sizing:border-box}
.btn{width:100%;padding:13px;border:0;border-radius:12px;background:#0f172a;color:white;font-size:16px;font-weight:700;margin-top:8px}
.btn2{background:#2563eb}
.btnDanger{background:#dc2626}
.mov{border-bottom:1px solid #e5e7eb;padding:12px 0}
.mov strong{display:block;font-size:15px}
.small{font-size:13px;color:#64748b;margin-top:3px}
.ok{color:#15803d;font-weight:800}
.no{color:#dc2626;font-weight:800}
.total{font-size:18px;font-weight:800;color:#0f172a}
.filtros{display:flex;gap:6px;margin-bottom:12px}
.filtros button{flex:1;padding:9px;border:0;border-radius:10px;background:#e5e7eb;font-weight:700;color:#334155}
.filtros button.active{background:#0f172a;color:white}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{border-bottom:1px solid #e5e7eb;padding:8px;text-align:right}
th:first-child,td:first-child{text-align:left}
</style>
</head>

<body>

<header>Mis Finanzas</header>

<nav>
<button class="active" onclick="showTab('tc',this)">TC</button>
<button onclick="showTab('bancos',this)">Bancos</button>
<button onclick="showTab('amortizacion',this)">Amort.</button>
<button onclick="showTab('resumen',this);cargarMesesResumen();generarResumen()">Resumen</button>
</nav>

<section id="tc" class="active">
<div class="card">
<h2>Consumos Tarjeta</h2>

<label>Fecha</label>
<input type="date" id="tcFecha">

<label>Tarjeta</label>
<select id="tcTarjeta">
<option>Pichincha</option>
<option>Produbanco</option>
<option>Otra</option>
</select>

<label>Concepto</label>
<select id="tcConcepto">
<option>Restaurante</option>
<option>Supermercado</option>
<option>Gasolina/Carro</option>
<option>Medicina</option>
<option>Doctor</option>
<option>Peluquería</option>
<option>Veterinaria</option>
<option>Tecnologico/Electrico</option>
<option>Hogar</option>
<option>Otros</option>
</select>

<label>Detalle</label>
<input id="tcDetalle" placeholder="Ej: farmacia, cena, supermercado">

<label>Tipo consumo</label>
<select id="tcTipo">
<option>Corriente</option>
<option>Diferido</option>
</select>

<label>Cuotas pagadas</label>
<input type="number" id="tcPagadas" value="0">

<label>Cuotas por pagar</label>
<input type="number" id="tcPorPagar" value="0">

<label>Valor consumo</label>
<input type="number" id="tcValor" step="0.01">

<label>Pago</label>
<input type="number" id="tcPago" step="0.01" value="0">

<button class="btn" onclick="guardarTC()">Guardar TC</button>
<button class="btn btn2" onclick="exportarPendientes('tc')">Exportar TC no conciliado a Excel</button>
</div>

<div class="card">
<h3>Movimientos TC</h3>
<div class="filtros">
<button id="fTCtodos" class="active" onclick="setFiltroTC('todos')">Todos</button>
<button id="fTCno" onclick="setFiltroTC('no')">No conciliados</button>
<button id="fTCsi" onclick="setFiltroTC('si')">Conciliados</button>
</div>
<div id="listaTC"></div>
</div>
</section>

<section id="bancos">
<div class="card">
<h2>Movimientos Bancos</h2>

<label>Fecha</label>
<input type="date" id="bFecha">

<label>Banco</label>
<select id="bBanco">
<option>Pichincha</option>
<option>Produbanco</option>
<option>Guayaquil</option>
<option>Bolivariano</option>
<option>Otro</option>
</select>

<label>Tipo</label>
<select id="bTipo">
<option>Ingreso</option>
<option>Egreso</option>
</select>

<label>Concepto</label>
<select id="bConcepto">
<option>Transferencia</option>
<option>Pago</option>
<option>Retiro</option>
<option>Depósito</option>
<option>Servicios</option>
<option>Otros</option>
</select>

<label>Detalle</label>
<input id="bDetalle" placeholder="Detalle">

<label>Valor</label>
<input type="number" id="bValor" step="0.01">

<button class="btn" onclick="guardarBanco()">Guardar Banco</button>
<button class="btn btn2" onclick="exportarPendientes('bancos')">Exportar Bancos no conciliado a Excel</button>
</div>

<div class="card">
<h3>Movimientos Bancos</h3>
<div class="filtros">
<button id="fBtodos" class="active" onclick="setFiltroBanco('todos')">Todos</button>
<button id="fBno" onclick="setFiltroBanco('no')">No conciliados</button>
<button id="fBsi" onclick="setFiltroBanco('si')">Conciliados</button>
</div>
<div id="listaBancos"></div>
</div>
</section>

<section id="amortizacion">
<div class="card">
<h2>Calculadora de Amortización</h2>

<label>Monto del préstamo</label>
<input type="number" id="amoMonto" step="0.01">

<label>Tasa anual %</label>
<input type="number" id="amoTasa" step="0.01">

<label>Plazo en meses</label>
<input type="number" id="amoMeses">

<button class="btn" onclick="calcularAmortizacion()">Calcular</button>
<button class="btn btn2" onclick="exportarAmortizacion()">Exportar Amortización a Excel</button>
</div>

<div class="card">
<div id="resumenAmo"></div>
<div style="overflow:auto">
<table id="tablaAmo"></table>
</div>
</div>
</section>

<section id="resumen">
<div class="card">
<h2>Resumen mensual</h2>

<label>Mes</label>
<select id="resMes" onchange="generarResumen()">
<option value="todos">Todos los meses</option>
</select>

<label>Origen</label>
<select id="resOrigen" onchange="generarResumen();cargarFiltroEntidad()">
<option value="todos">TC + Bancos</option>
<option value="tc">Solo TC</option>
<option value="bancos">Solo Bancos</option>
</select>

<label>Tarjeta / Banco</label>
<select id="resEntidad" onchange="generarResumen()">
<option value="todos">Todas las tarjetas y bancos</option>
</select>

<label>Estado</label>
<select id="resEstado" onchange="generarResumen()">
<option value="todos">Todos</option>
<option value="no">No conciliados</option>
<option value="si">Conciliados</option>
</select>

<button class="btn btn2" onclick="exportarResumen()">Exportar Resumen a Excel</button>
</div>

<div class="card">
<div id="totalResumen" class="total"></div>
<div style="overflow:auto">
<table id="tablaResumen"></table>
</div>
</div>
</section>

<script>
let tc = JSON.parse(localStorage.getItem("tc")) || [];
let bancos = JSON.parse(localStorage.getItem("bancos")) || [];
let amortizacion = [];
let resumenMensual = [];
let filtroTC = "todos";
let filtroBanco = "todos";

document.getElementById("tcFecha").valueAsDate = new Date();
document.getElementById("bFecha").valueAsDate = new Date();

function showTab(id,btn){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

function formato(n){
  return Number(n||0).toLocaleString("es-EC",{minimumFractionDigits:2,maximumFractionDigits:2});
}

function mesClave(fecha){
  if(!fecha) return "Sin fecha";
  return fecha.substring(0,7);
}

function mesTexto(fecha){
  if(!fecha) return "Sin fecha";
  const d = new Date(fecha + "T00:00:00");
  const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return meses[d.getMonth()] + "-" + String(d.getFullYear()).slice(-2);
}

function normalizarTC(m){
  return {
    Fecha: m.Fecha || m.fecha || "",
    Tarjeta: m.Tarjeta || m.tarjeta || "",
    Concepto: m.Concepto || m.concepto || "",
    Detalle: m.Detalle || m.detalle || "",
    Tipo: m.Tipo || m.tipo || "Corriente",
    CuotasPagadas: Number(m.CuotasPagadas ?? m.cuotasPagadas ?? 0),
    CuotasPorPagar: Number(m.CuotasPorPagar ?? m.cuotasPorPagar ?? 0),
    Valor: Number(m.Valor ?? m.valor ?? 0),
    Pago: Number(m.Pago ?? m.pago ?? 0),
    Acumulado: Number(m.Acumulado ?? m.acumulado ?? ((m.Valor ?? m.valor ?? 0) - (m.Pago ?? m.pago ?? 0))),
    SaldoDiferido: Number(m.SaldoDiferido ?? m.saldoDiferido ?? 0),
    Conciliado: m.Conciliado || m.conciliado || "No"
  };
}

function normalizarBanco(m){
  return {
    Fecha: m.Fecha || m.fecha || "",
    Banco: m.Banco || m.banco || "",
    Tipo: m.Tipo || m.tipo || "",
    Concepto: m.Concepto || m.concepto || "",
    Detalle: m.Detalle || m.detalle || "",
    Valor: Number(m.Valor ?? m.valor ?? 0),
    Conciliado: m.Conciliado || m.conciliado || "No"
  };
}

tc = tc.map(normalizarTC);
bancos = bancos.map(normalizarBanco);
localStorage.setItem("tc", JSON.stringify(tc));
localStorage.setItem("bancos", JSON.stringify(bancos));

function setFiltroTC(valor){
  filtroTC = valor;
  document.querySelectorAll("#tc .filtros button").forEach(b=>b.classList.remove("active"));
  document.getElementById("fTC"+valor).classList.add("active");
  mostrarTC();
}

function setFiltroBanco(valor){
  filtroBanco = valor;
  document.querySelectorAll("#bancos .filtros button").forEach(b=>b.classList.remove("active"));
  document.getElementById("fB"+valor).classList.add("active");
  mostrarBancos();
}

function pasaFiltro(m,filtro){
  if(filtro==="no" && m.Conciliado==="Si") return false;
  if(filtro==="si" && m.Conciliado!=="Si") return false;
  return true;
}

function guardarTC(){
  let valor = Number(tcValor.value || 0);
  let pago = Number(tcPago.value || 0);
  let cuotasPorPagar = Number(tcPorPagar.value || 0);
  let saldoDiferido = tcTipo.value === "Diferido" ? valor * cuotasPorPagar : 0;

  tc.push({
    Fecha: tcFecha.value,
    Tarjeta: tcTarjeta.value,
    Concepto: tcConcepto.value,
    Detalle: tcDetalle.value,
    Tipo: tcTipo.value,
    CuotasPagadas: Number(tcPagadas.value || 0),
    CuotasPorPagar: cuotasPorPagar,
    Valor: valor,
    Pago: pago,
    Acumulado: valor - pago,
    SaldoDiferido: saldoDiferido,
    Conciliado: "No"
  });

  localStorage.setItem("tc",JSON.stringify(tc));
  tcDetalle.value="";
  tcValor.value="";
  tcPago.value=0;
  tcPagadas.value=0;
  tcPorPagar.value=0;
  mostrarTC();
  cargarMesesResumen();
}

function mostrarTC(){
  listaTC.innerHTML="";
  tc.slice().reverse().forEach((m,i)=>{
    if(!pasaFiltro(m,filtroTC)) return;
    let idx = tc.length-1-i;
    listaTC.innerHTML += `
    <div class="mov">
      <strong>${m.Fecha} | ${m.Tarjeta} | ${m.Concepto}</strong>
      <div>${m.Detalle || ""}</div>
      <div class="small">Tipo: <b>${m.Tipo}</b></div>
      <div class="small">Cuotas pagadas: <b>${m.CuotasPagadas}</b> | Cuotas por pagar: <b>${m.CuotasPorPagar}</b></div>
      <div class="small">Valor consumo: $${formato(m.Valor)} | Pago: $${formato(m.Pago)}</div>
      <div class="small">Acumulado: $${formato(m.Acumulado)} | Saldo diferido: $${formato(m.SaldoDiferido)}</div>
      <div class="${m.Conciliado==='Si'?'ok':'no'}">Estado: ${m.Conciliado==='Si'?'Conciliado':'No conciliado'}</div>
      <button class="btn btnDanger" onclick="eliminarTC(${idx})">Eliminar</button>
    </div>`;
  });
}

function eliminarTC(i){
  tc.splice(i,1);
  localStorage.setItem("tc",JSON.stringify(tc));
  mostrarTC();
  cargarMesesResumen();
}

function guardarBanco(){
  bancos.push({
    Fecha: bFecha.value,
    Banco: bBanco.value,
    Tipo: bTipo.value,
    Concepto: bConcepto.value,
    Detalle: bDetalle.value,
    Valor: Number(bValor.value || 0),
    Conciliado:"No"
  });

  localStorage.setItem("bancos",JSON.stringify(bancos));
  bDetalle.value="";
  bValor.value="";
  mostrarBancos();
  cargarMesesResumen();
}

function mostrarBancos(){
  listaBancos.innerHTML="";
  bancos.slice().reverse().forEach((m,i)=>{
    if(!pasaFiltro(m,filtroBanco)) return;
    let idx = bancos.length-1-i;
    listaBancos.innerHTML += `
    <div class="mov">
      <strong>${m.Fecha} | ${m.Banco} | ${m.Tipo}</strong>
      <div>${m.Concepto || ""} ${m.Detalle ? "- " + m.Detalle : ""}</div>
      <div class="small">Valor: $${formato(m.Valor)}</div>
      <div class="${m.Conciliado==='Si'?'ok':'no'}">Estado: ${m.Conciliado==='Si'?'Conciliado':'No conciliado'}</div>
      <button class="btn btnDanger" onclick="eliminarBanco(${idx})">Eliminar</button>
    </div>`;
  });
}

function eliminarBanco(i){
  bancos.splice(i,1);
  localStorage.setItem("bancos",JSON.stringify(bancos));
  mostrarBancos();
  cargarMesesResumen();
}

function exportarPendientes(tipo){
  let data = tipo==="tc" ? tc : bancos;
  let pendientes = data.filter(d => d.Conciliado !== "Si");

  if(pendientes.length===0){
    alert("No hay registros no conciliados para exportar");
    return;
  }

  let wb = XLSX.utils.book_new();
  let ws = XLSX.utils.json_to_sheet(pendientes);
  XLSX.utils.book_append_sheet(wb, ws, tipo==="tc" ? "TC" : "Bancos");
  XLSX.writeFile(wb, tipo==="tc" ? "TC_no_conciliado.xlsx" : "Bancos_no_conciliado.xlsx");

  data.forEach(d=>{
    if(d.Conciliado !== "Si"){
      d.Conciliado = "Si";
    }
  });

  if(tipo==="tc"){
    localStorage.setItem("tc",JSON.stringify(tc));
    mostrarTC();
  }else{
    localStorage.setItem("bancos",JSON.stringify(bancos));
    mostrarBancos();
  }

  cargarMesesResumen();
  generarResumen();
}

function calcularAmortizacion(){
  let monto = Number(amoMonto.value || 0);
  let tasaAnual = Number(amoTasa.value || 0) / 100;
  let meses = Number(amoMeses.value || 0);
  let tasaMensual = tasaAnual / 12;

  if(monto<=0 || meses<=0){
    alert("Ingrese monto y plazo válidos");
    return;
  }

  let cuota = tasaMensual===0
    ? monto/meses
    : monto*(tasaMensual*Math.pow(1+tasaMensual,meses))/(Math.pow(1+tasaMensual,meses)-1);

  let saldo = monto;
  let totalInteres = 0;
  amortizacion = [];

  for(let i=1;i<=meses;i++){
    let interes = saldo*tasaMensual;
    let capital = cuota-interes;

    if(i===meses){
      capital = saldo;
      cuota = capital+interes;
    }

    saldo -= capital;
    if(saldo<0.01) saldo=0;
    totalInteres += interes;

    amortizacion.push({
      Mes:i,
      Cuota:Number(cuota.toFixed(2)),
      Interes:Number(interes.toFixed(2)),
      Capital:Number(capital.toFixed(2)),
      Saldo:Number(saldo.toFixed(2))
    });
  }

  resumenAmo.innerHTML = `
  <p class="total">Cuota mensual: $${formato(amortizacion[0].Cuota)}</p>
  <p class="total">Intereses totales: $${formato(totalInteres)}</p>
  <p class="total">Total pagado: $${formato(monto+totalInteres)}</p>`;

  tablaAmo.innerHTML = `
  <tr>
    <th>Mes</th>
    <th>Cuota</th>
    <th>Interés</th>
    <th>Capital</th>
    <th>Saldo</th>
  </tr>`;

  amortizacion.forEach(r=>{
    tablaAmo.innerHTML += `
    <tr>
      <td>${r.Mes}</td>
      <td>${formato(r.Cuota)}</td>
      <td>${formato(r.Interes)}</td>
      <td>${formato(r.Capital)}</td>
      <td>${formato(r.Saldo)}</td>
    </tr>`;
  });
}

function exportarAmortizacion(){
  if(amortizacion.length===0){
    alert("Primero calcule la amortización");
    return;
  }

  let wb = XLSX.utils.book_new();
  let resumen = [{
    Monto:Number(amoMonto.value||0),
    TasaAnual:Number(amoTasa.value||0),
    Meses:Number(amoMeses.value||0),
    CuotaMensual:amortizacion[0].Cuota,
    InteresesTotales:Number(amortizacion.reduce((a,b)=>a+b.Interes,0).toFixed(2)),
    TotalPagado:Number(amortizacion.reduce((a,b)=>a+b.Cuota,0).toFixed(2))
  }];

  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumen), "Resumen");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(amortizacion), "Tabla");
  XLSX.writeFile(wb,"Amortizacion.xlsx");
}

function cargarMesesResumen(){
  const actual = resMes ? resMes.value : "todos";
  const meses = new Map();

  [...tc.map(x=>x.Fecha), ...bancos.map(x=>x.Fecha)].forEach(f=>{
    if(f){
      meses.set(mesClave(f), mesTexto(f));
    }
  });

  if(!resMes) return;

  resMes.innerHTML = `<option value="todos">Todos los meses</option>`;
  Array.from(meses.entries()).sort().reverse().forEach(([clave,texto])=>{
    resMes.innerHTML += `<option value="${clave}">${texto}</option>`;
  });

  if(Array.from(meses.keys()).includes(actual)){
    resMes.value = actual;
  }
}

function cargarFiltroEntidad(){
  const origen = resOrigen.value;
  const actual = resEntidad.value;
  let valores = [];

  if(origen==="todos"){
    valores = [
      ...tc.map(x=>"TC: " + x.Tarjeta),
      ...bancos.map(x=>"Banco: " + x.Banco)
    ];
    resEntidad.innerHTML = `<option value="todos">Todas las tarjetas y bancos</option>`;
  }

  if(origen==="tc"){
    valores = tc.map(x=>x.Tarjeta);
    resEntidad.innerHTML = `<option value="todos">Todas las tarjetas</option>`;
  }

  if(origen==="bancos"){
    valores = bancos.map(x=>x.Banco);
    resEntidad.innerHTML = `<option value="todos">Todos los bancos</option>`;
  }

  [...new Set(valores.filter(Boolean))].sort().forEach(v=>{
    resEntidad.innerHTML += `<option value="${v}">${v}</option>`;
  });

  if([...resEntidad.options].some(o=>o.value===actual)){
    resEntidad.value = actual;
  }

  generarResumen();
}

function generarResumen(){
  if(!tablaResumen) return;

  const mesFiltro = resMes.value;
  const origenFiltro = resOrigen.value;
  const entidadFiltro = resEntidad.value;
  const estadoFiltro = resEstado.value;

  let datos = [];

  if(origenFiltro==="todos" || origenFiltro==="tc"){
    tc.forEach(m=>{
      datos.push({
        Origen:"TC",
        Entidad:m.Tarjeta,
        EntidadFiltro:"TC: " + m.Tarjeta,
        MesClave:mesClave(m.Fecha),
        Mes:mesTexto(m.Fecha),
        Concepto:m.Concepto || "Sin concepto",
        Estado:m.Conciliado==="Si" ? "Conciliado" : "No conciliado",
        Valor:Number(m.Valor||0)
      });
    });
  }

  if(origenFiltro==="todos" || origenFiltro==="bancos"){
    bancos.forEach(m=>{
      datos.push({
        Origen:"Bancos",
        Entidad:m.Banco,
        EntidadFiltro:"Banco: " + m.Banco,
        MesClave:mesClave(m.Fecha),
        Mes:mesTexto(m.Fecha),
        Concepto:m.Concepto || "Sin concepto",
        Estado:m.Conciliado==="Si" ? "Conciliado" : "No conciliado",
        Valor:Number(m.Valor||0)
      });
    });
  }

  if(mesFiltro!=="todos"){
    datos = datos.filter(d=>d.MesClave===mesFiltro);
  }

  if(estadoFiltro==="no"){
    datos = datos.filter(d=>d.Estado==="No conciliado");
  }

  if(estadoFiltro==="si"){
    datos = datos.filter(d=>d.Estado==="Conciliado");
  }

  if(entidadFiltro!=="todos"){
    if(origenFiltro==="todos"){
      datos = datos.filter(d=>d.EntidadFiltro===entidadFiltro);
    }else{
      datos = datos.filter(d=>d.Entidad===entidadFiltro);
    }
  }

  const mapa = {};
  let totalGeneral = 0;

  datos.forEach(d=>{
    const clave = d.Origen + "|" + d.Entidad + "|" + d.Mes + "|" + d.Concepto + "|" + d.Estado;
    if(!mapa[clave]){
      mapa[clave] = {
        Origen:d.Origen,
        TarjetaBanco:d.Entidad,
        Mes:d.Mes,
        Concepto:d.Concepto,
        Estado:d.Estado,
        Cantidad:0,
        Total:0
      };
    }
    mapa[clave].Cantidad += 1;
    mapa[clave].Total += d.Valor;
    totalGeneral += d.Valor;
  });

  resumenMensual = Object.values(mapa).sort((a,b)=>{
    if(a.Mes!==b.Mes) return a.Mes.localeCompare(b.Mes);
    if(a.Origen!==b.Origen) return a.Origen.localeCompare(b.Origen);
    if(a.TarjetaBanco!==b.TarjetaBanco) return a.TarjetaBanco.localeCompare(b.TarjetaBanco);
    return a.Concepto.localeCompare(b.Concepto);
  });

  totalResumen.innerHTML = `Total seleccionado: $${formato(totalGeneral)}`;

  tablaResumen.innerHTML = `
  <tr>
    <th>Origen</th>
    <th>Tarjeta/Banco</th>
    <th>Mes</th>
    <th>Concepto</th>
    <th>Estado</th>
    <th>Cant.</th>
    <th>Total</th>
  </tr>`;

  if(resumenMensual.length===0){
    tablaResumen.innerHTML += `<tr><td colspan="7">No hay datos para mostrar</td></tr>`;
    return;
  }

  resumenMensual.forEach(r=>{
    tablaResumen.innerHTML += `
    <tr>
      <td>${r.Origen}</td>
      <td>${r.TarjetaBanco}</td>
      <td>${r.Mes}</td>
      <td>${r.Concepto}</td>
      <td>${r.Estado}</td>
      <td>${r.Cantidad}</td>
      <td>$${formato(r.Total)}</td>
    </tr>`;
  });
}

function exportarResumen(){
  generarResumen();

  if(resumenMensual.length===0){
    alert("No hay resumen para exportar");
    return;
  }

  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumenMensual), "Resumen");
  XLSX.writeFile(wb,"Resumen_mensual.xlsx");
}

mostrarTC();
mostrarBancos();
cargarMesesResumen();
cargarFiltroEntidad();
generarResumen();
</script>
